name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Clone the Hugging Face space
          # Note: Replace 'Naveensingh2507' and 'interview-backend' if your Hugging Face username or space name is different
          git clone https://Naveensingh2507:$HF_TOKEN@huggingface.co/spaces/Naveensingh2507/interview-backend hf_space
          
          # Use rsync to copy the backend folder into the space, deleting old files
          rsync -av --delete --exclude '.git' backend/ hf_space/
          
          # Commit and push
          cd hf_space
          git add .
          git commit -m "Auto sync backend from GitHub (Commit: $GITHUB_SHA)" || echo "No changes to commit"
          git push
